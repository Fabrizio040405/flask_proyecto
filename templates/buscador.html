<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador</title>
    <style>
        *{ background-color: black; color:white }
        button{ border-color: aqua; cursor: pointer; }
        table{ border-color: aqua; }
    </style>
</head>
<body>
    <center>
        <h1>Indique el producto a buscar:</h1>
        <br>
        <form id="formBuscador">
            <table align="center" border="5">
                <tr>
                    <td>Id producto :</td>
                    <td><input type="text" id="productoInput" required></td>
                    <td><button type="submit">Buscar</button></td>
                </tr>
            </table>
        </form>

        <div id="resultado" style="margin-top: 20px;"></div>
        
        <br>
        <button onclick="window.location.href='principal.html'">Regresar</button>
    </center>

    <script>
        // Seguridad: revisar si está logueado
        if (!localStorage.getItem("usuarioLogueado")) {
            window.location.href = "login.html";
        }

        const BACKEND_URL = "https://flask-proyecto-gfax.onrender.com"; 

        document.getElementById('formBuscador').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const codigo = document.getElementById('productoInput').value;
            const cajaResultado = document.getElementById('resultado');

            try {
                const response = await fetch(`${BACKEND_URL}/api/buscar_producto`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ producto: codigo })
                });

                const data = await response.json();

                if (data.status === "ok") {
                    const p = data.data;
                    cajaResultado.innerHTML = `
                        <h3>Producto encontrado:</h3>
                        <p><b>Nombre:</b> ${p.nombre}</p>
                        <p><b>Precio:</b> S/ ${p.precio}</p>
                        <p><b>Stock:</b> ${p.stock}</p>
                    `;
                } else {
                    cajaResultado.innerHTML = `<h3 style="color:red">${data.message}</h3>`;
                }
            } catch (error) {
                cajaResultado.innerHTML = `<h3 style="color:red">Error de conexión</h3>`;
            }
        });
    </script>
</body>
</html>
