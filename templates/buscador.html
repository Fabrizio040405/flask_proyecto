<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador</title>
    <style>
        *{ background-color: black; color:white }
        button{ border-color: aqua; cursor: pointer; }
        table{ border-color: aqua; }
    </style>
</head>
<body>
    <center>
        <h1>Indique el producto a buscar:</h1>
        <br>
        <form id="formBuscador">
            <table align="center" border="5">
                <tr>
                    <td>Id producto :</td>
                    <td><input type="text" id="productoInput" required></td>
                    <td><button type="submit">Buscar</button></td>
                </tr>
            </table>
        </form>

        <div id="resultado" style="margin-top: 20px;"></div>
        
        <br>
        <button onclick="window.location.href='principal.html'">Regresar</button>
    </center>

    <script>
        // Seguridad: revisar si está logueado
        if (!localStorage.getItem("usuarioLogueado")) {
            window.location.href = "login.html";
        }

        // Tu URL real de Render que vimos en la primera imagen
        const BACKEND_URL = "https://flask-proyecto-gfax.onrender.com"; 

        document.getElementById('formBuscador').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const codigo = document.getElementById('productoInput').value;
            const cajaResultado = document.getElementById('resultado');

            try {
                const response = await fetch(`${BACKEND_URL}/api/buscar_producto`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ producto: codigo })
                });

                const data = await response.json();

                // CASO 1: Si Python devuelve un error (ej. P004 no existe o no tiene 4 letras)
                if (data.error) {
                    cajaResultado.innerHTML = `<h3 style="color:red">${data.error}</h3>`;
                } 
                // CASO 2: Si Python devuelve el producto (tu app.py devuelve una lista de datos)
                else if (Array.isArray(data)) {
                    cajaResultado.innerHTML = `
                        <h3>Producto encontrado:</h3>
                        <table align="center" border="1" style="border-color: aqua; width: 60%;">
                            <tr><td><b>Código:</b></td><td>${data[1]}</td></tr>
                            <tr><td><b>Nombre:</b></td><td>${data[2]}</td></tr>
                            <tr><td><b>Descripción:</b></td><td>${data[3]}</td></tr>
                            <tr><td><b>Precio:</b></td><td>S/ ${data[4]}</td></tr>
                            <tr><td><b>Stock:</b></td><td>${data[5]}</td></tr>
                            <tr><td><b>Categoría:</b></td><td>${data[6]}</td></tr>
                        </table>
                    `;
                } else {
                    cajaResultado.innerHTML = `<h3 style="color:red">Error procesando los datos.</h3>`;
                }
            } catch (error) {
                cajaResultado.innerHTML = `<h3 style="color:red">Error de conexión con el servidor.</h3>`;
                console.error(error);
            }
        });
    </script>
</body>
</html>
