<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Buscador </title>
    <style>
        *{
            background-color: black;
            color:white
        }
        button{
            border-color: aqua;
        }
        table{
            border-color: aqua;
            margin-top: 15px;
        }
        #tabla-resultado {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <center>
        <h1 id="msg-buscador">{{ message }}</h1>
        <br>
        <form id="form-buscar-producto">
            <table align="center" border = "5">
                <tr>
                    <td>Id producto :</td>
                    <td><input type="text" name="producto" required></td>
                    <td><button type="submit"> Buscar </button></td>
                </tr>
            </table>
        </form>

        <div id="tabla-resultado"></div>
        
        <br>
        <button onclick="window.location.href='https://flask-proyecto-examen-parcial.onrender.com/principal'">Regresar</button>
    </center>

    <script>
        // Corrección del texto base en entornos estáticos
        window.addEventListener('DOMContentLoaded', () => {
            const el = document.getElementById('msg-buscador');
            if (el && el.innerText.includes('{{')) {
                el.innerText = "Indique el producto a buscar: ";
            }
        });

        // Intercepta el formulario para procesarlo mediante la API JSON
        document.getElementById('form-buscar-producto').addEventListener('submit', async function(e) {
            e.preventDefault(); 

            const formData = new FormData(this);
            const contenedor = document.getElementById('tabla-resultado');
            contenedor.innerHTML = "<p style='color: yellow;'>Buscando información...</p>";

            try {
                const response = await fetch('https://flask-proyecto-examen-parcial.onrender.com/api/buscar_producto', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.error) {
                    // Muestra el mensaje de error estructurado en tu app.py
                    contenedor.innerHTML = `<h3 style="color: red;">${data.error}</h3>`;
                } else {
                    // Dibuja la información del producto mapeando los índices del fetchone() de SQLite
                    contenedor.innerHTML = `
                        <h3 style="color: lime;">Producto encontrado con éxito</h3>
                        <table border="5" align="center">
                            <tr><th>Campo</th><th>Detalle</th></tr>
                            <tr><td>Código</td><td>${data[1]}</td></tr>
                            <tr><td>Nombre</td><td>${data[2]}</td></tr>
                            <tr><td>Descripción</td><td>${data[3]}</td></tr>
                            <tr><td>Precio</td><td>S/ ${data[4]}</td></tr>
                            <tr><td>Stock</td><td>${data[5]} unidades</td></tr>
                            <tr><td>Categoría</td><td>${data[6]}</td></tr>
                        </table>
                    `;
                }
            } catch (err) {
                contenedor.innerHTML = "<h3 style='color: red;'>Error al conectar con la API del servidor.</h3>";
            }
        });
    </script>
</body>
</html>
