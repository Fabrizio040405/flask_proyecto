<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principal</title>
    <style>
        *{
            background-color: black;
            color:white
        }
        button{
            size: 20px;
            border-color: aqua
        }
        body{
            align-content: center;
        }
    </style>
</head>
<body>
    <center>
    <form action="https://flask-proyecto-examen-parcial.onrender.com/buscador" method="get">
        <h1 id="msg-principal">{{ message }}</h1>
        <button type="submit">Buscador</button>
    </form>
    <br>
    <form action="https://flask-proyecto-examen-parcial.onrender.com/logout" method="get">
        <button type="submit">Cerrar Sesión</button>
    </form>
    </center>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const el = document.getElementById('msg-principal');
            if (el && el.innerText.includes('{{')) {
                el.innerText = "Bienvenido al panel principal";
            }
        });
    </script>
</body>
</html>
